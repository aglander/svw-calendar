name: Import Calendars

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: import-calendars
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import shadow plan (optional)
        run: |
          if [ -f data/operator-plan.xlsx ]; then
            npm run import:shadow
          else
            echo "No data/operator-plan.xlsx found. Skipping shadow import."
          fi

      - name: Import calendars
        run: npm run import:calendars

      - name: Commit updated calendar data
        run: |
          if git diff --quiet -- public/data/events.json public/data/last-sync.json public/data/shadow-slots.json public/data/shadow-summary.json; then
            echo "No calendar changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json public/data/last-sync.json public/data/shadow-slots.json public/data/shadow-summary.json
          git commit -m "chore: refresh calendar data"
          git push
